
<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>音檔下載 — 專屬認證頁</title><link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet"><style>  * { box-sizing: border-box; margin: 0; padding: 0; }  body {    min-height: 100vh;    display: flex;    align-items: center;    justify-content: center;    /* 將您的貼紙圖片設為滿版背景，並加上溫暖的米白襯底 */    background: #fdfaf6 url('材料包貼紙.jpg') no-repeat center center fixed;    background-size: cover;    font-family: 'Georgia', 'Noto Serif TC', serif;    padding: 2rem;  }  .card {    /* 溫柔的半透明白色卡片，帶有精緻的毛玻璃霧面效果 */    background: rgba(255, 255, 255, 0.85);    backdrop-filter: blur(8px);    -webkit-backdrop-filter: blur(8px);    border-radius: 16px; /* 圓潤圓角更具親和力 */    width: 100%;    max-width: 420px;    overflow: hidden;    border: 1px solid rgba(224, 211, 196, 0.6);    box-shadow: 0 12px 30px rgba(138, 117, 96, 0.15);  }  .header {    background: rgba(29, 69, 44, 0.9); /* 沿用貼紙標題「あそびの種」的繪本深墨綠 */    padding: 2.5rem 2rem 2rem;    text-align: center;  }  .waveform {    display: flex;    align-items: flex-end;    justify-content: center;    gap: 3px;    height: 36px;    margin-bottom: 1.25rem;  }  .waveform span {    width: 4px;    background: #88af86; /* 媽媽衣服的溫柔草綠色 */    border-radius: 2px;    animation: wave 1.4s ease-in-out infinite;    opacity: 0.9;  }  @keyframes wave {    0%, 100% { transform: scaleY(0.4); }    50% { transform: scaleY(1); }  }  .header h1 { color: #ffffff; font-size: 1.25rem; font-weight: 500; letter-spacing: 0.08em; margin-bottom: 0.3rem; }  .header p { color: #b7d5b4; font-size: 0.78rem; letter-spacing: 0.05em; }  .body { padding: 2.2rem 2rem; }  .label { font-size: 0.78rem; color: #1d452c; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 0.6rem; display: block; }  .select-wrap { position: relative; margin-bottom: 1.4rem; }  select {    width: 100%; padding: 0.75rem 1rem; font-size: 0.9rem;    font-family: inherit; color: #1d452c; background: rgba(24cf, 245, 240, 0.7);    border: 1px solid #b2cbb5; border-radius: 8px; appearance: none; cursor: pointer;  }  select:focus { outline: 2px solid #88af86; outline-offset: 1px; }  .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7d60; font-size: 14px; }  .input-wrap { position: relative; margin-bottom: 1.6rem; }  input[type="text"] {    width: 100%; padding: 0.75rem 2.8rem 0.75rem 1rem; font-size: 1rem;    font-family: inherit; letter-spacing: 0.12em; color: #1d452c;    background: rgba(250, 247, 242, 0.7); border: 1px solid #c8e0cc; border-radius: 8px; transition: border-color 0.2s;  }  input[type="text"]:focus { outline: 2px solid #88af86; outline-offset: 1px; border-color: #88af86; }  input[type="text"].error { border-color: #d16b6b; background: #fff5f5; }  .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #88af86; font-size: 18px; pointer-events: none; }  .btn {    width: 100%; padding: 0.85rem; background: #1d452c; color: #ffffff;    border: none; border-radius: 8px; font-family: inherit; font-size: 0.95rem;    font-weight: 500; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;    box-shadow: 0 4px 12px rgba(29, 69, 44, 0.2);  }  .btn:hover { background: #285a3c; }  .btn:active { transform: scale(0.99); }  .error-msg { color: #d16b6b; font-size: 0.8rem; margin-top: -1.1rem; margin-bottom: 1.2rem; display: none; }  .success-panel { display: none; text-align: center; padding: 1rem 0 0.5rem; }  .success-icon {    width: 56px; height: 56px; background: #e8f4ec; border-radius: 50%;    display: flex; align-items: center; justify-content: center;    margin: 0 auto 1.2rem; color: #1d452c; font-size: 24px;  }  .success-panel h2 { font-size: 1.1rem; color: #1d452c; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: 0.05em; }  .success-panel p { font-size: 0.85rem; color: #5a7d60; margin-bottom: 1.8rem; }  .download-btn {    display: inline-flex; align-items: center; gap: 8px;    padding: 0.8rem 1.8rem; background: #e59393; color: #ffffff; /* 點擊按鈕採用大愛心的水彩溫暖粉紅 */    text-decoration: none; border-radius: 8px; font-family: inherit;    font-size: 0.9rem; font-weight: 500; letter-spacing: 0.06em; transition: background 0.2s;    box-shadow: 0 4px 12px rgba(229, 147, 147, 0.3);  }  .download-btn:hover { background: #d68080; }  .footer { padding: 1.2rem 2rem; border-top: 1px solid rgba(226, 235, 228, 0.6); text-align: center; font-size: 0.72rem; color: #889b8e; letter-spacing: 0.04em; }</style></head><body><div class="card">  <div class="header">    <div class="waveform" id="waveform"></div>    <h1>音檔下載專區</h1>    <p>限購買者專屬 · MEMBERS ONLY</p>  </div>  <div class="body">    <div id="auth-form">      <label class="label" for="product-select">選擇購買的材料包</label>      <div class="select-wrap">        <select id="product-select">          <option value="">— 請選擇您購買的商品 —</option>          <option value="pack-a">福笑 試用版</option>          <option value="pack-b">福笑 正式版</option>          <option value="pack-c">動物列車 正式版</option>        </select>        <i class="ti ti-chevron-down select-arrow" aria-hidden="true"></i>      </div>      <label class="label" for="password-input">驗證碼</label>      <div class="input-wrap">        <input type="text" id="password-input" placeholder="請輸入材料包上的驗證碼" maxlength="20" autocomplete="off">        <i class="ti ti-lock input-icon" aria-hidden="true"></i>      </div>      <p class="error-msg" id="error-msg">        <i class="ti ti-alert-circle" style="vertical-align:-2px; margin-right:4px;"></i>        驗證碼不正確，請再確認一次。      </p>      <button class="btn" onclick="checkAuth()">驗證並下載音檔</button>    </div>    <div class="success-panel" id="success-panel">      <div class="success-icon"><i class="ti ti-check" aria-hidden="true"></i></div>      <h2>驗證成功！</h2>      <p id="success-product-name">福笑 試用版 的音檔</p>      <a href="#" id="download-link" class="download-btn">        <i class="ti ti-download" aria-hidden="true"></i>        點此下載音檔      </a>    </div>  </div>  <div class="footer">購買者限定內容 · 請勿轉發或分享連結</div></div><script>const PRODUCTS = {  "pack-a": {    name: "福笑 試用版",    passwords: ["AFU-0001"],    driveUrl: "https://drive.google.com/file/d/1L-YzKYs9RvgXUenqz4fY4LRcZl7rGzA6/view?usp=sharing"  },  "pack-b": {    name: "福笑 正式版",    passwords: ["XIAOJIANG-0002"],    driveUrl: "https://drive.google.com/file/d/YOUR_FILE_ID_B/view"  },  "pack-c": {    name: "動物列車 正式版",    passwords: ["UASAGI-0003"],    driveUrl: "https://drive.google.com/file/d/YOUR_FILE_ID_C/view"  }};const heights = [8,14,22,30,36,30,24,18,12,16,24,32,28,20,14,10,18,26,34,30,22];const waveform = document.getElementById('waveform');heights.forEach((h, i) => {  const span = document.createElement('span');  span.style.height = h + 'px';  span.style.animationDelay = (i * 0.07) + 's';  waveform.appendChild(span);});function checkAuth() {  const productKey = document.getElementById('product-select').value;  const code = document.getElementById('password-input').value.trim().toUpperCase();  const errorMsg = document.getElementById('error-msg');  const input = document.getElementById('password-input');  errorMsg.style.display = 'none';  input.classList.remove('error');  if (!productKey) {    errorMsg.textContent = '請先選擇您購買的材料包。';    errorMsg.style.display = 'block';    return;  }  if (!code) {    errorMsg.textContent = '請輸入驗證碼。';    errorMsg.style.display = 'block';    input.classList.add('error');    return;  }  const product = PRODUCTS[productKey];  if (product.passwords.includes(code)) {    document.getElementById('auth-form').style.display = 'none';    document.getElementById('success-panel').style.display = 'block';    document.getElementById('success-product-name').textContent = product.name + ' 的音檔';    document.getElementById('download-link').href = product.driveUrl;  } else {    errorMsg.textContent = '驗證碼不正確，請再確認一次。';    errorMsg.style.display = 'block';    input.classList.add('error');    input.value = '';    input.focus();  }}document.getElementById('password-input').addEventListener('keydown', e => {  if (e.key === 'Enter') checkAuth();});</script></body></html>
